<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#ffcc05"><link rel="manifest" href="/client.webmanifest"><link rel="stylesheet" href="/client.css"><title>Formae Clienti</title></head><body><main><header><img src="/brand/formae-mark.png" alt="Formae"><button id="logout" hidden>Esci</button></header><section id="login" class="card"><h1>La tua area Formae</h1><p>Accedi con il numero registrato e il tuo PIN.</p><form id="login-form"><input name="phone" type="tel" placeholder="Numero WhatsApp" required><input name="pin" inputmode="numeric" type="password" placeholder="PIN personale o codice temporaneo" required><button>Accedi</button></form><p id="error"></p></section><section id="app" hidden><div class="hero"><p id="greeting"></p><h1>Il tuo percorso</h1></div><div id="stats" class="stats"></div><section class="card"><h2>Il tuo PIN</h2><form id="change-pin"><input name="pin" inputmode="numeric" type="password" pattern="[0-9]{4,10}" placeholder="Scegli un nuovo PIN (4-10 cifre)" required><button>Salva nuovo PIN</button></form></section><section class="card"><h2>Prossimi appuntamenti</h2><div id="schedule"></div></section><section class="card"><h2>Richiedi allenamento</h2><form id="booking"><input name="date" type="date" required><input name="time" type="time" required><select name="trainer" id="trainer"></select><button>Invia richiesta</button></form></section><section class="card"><h2>Progressi</h2><div id="charts"></div><div id="workouts"></div></section><section class="card"><h2>Le tue schede</h2><div id="templates"></div></section></section></main><script src="/client.js"></script></body></html>
